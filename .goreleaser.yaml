version: 2

project_name: whoop-mcp-server

builds:
  - main: .
    binary: whoop-mcp-server
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

brews:
  - name: whoop-mcp-server
    repository:
      owner: Zayden16
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/Zayden16/whoop-mcp-server
    description: MCP server for the official Whoop API v2
    license: MIT

changelog:
  use: github
  sort: asc
